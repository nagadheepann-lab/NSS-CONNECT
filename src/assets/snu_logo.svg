<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&amp;family=Montserrat:wght@500;700&amp;display=swap');
      
      .brand-title {
        font-family: 'Cinzel', 'Playfair Display', 'Times New Roman', serif;
        font-weight: 600;
        fill: #1b52a4;
        letter-spacing: 0.08em;
        font-size: 50px;
        text-anchor: middle;
      }
      
      .brand-subtitle {
        font-family: 'Montserrat', 'Inter', 'Helvetica Neue', sans-serif;
        font-weight: 500;
        fill: #1b52a4;
        letter-spacing: 0.35em;
        font-size: 19px;
        text-anchor: middle;
      }
      
      .brand-location {
        font-family: 'Montserrat', 'Inter', 'Helvetica Neue', sans-serif;
        font-weight: 700;
        fill: #1a1a1a;
        letter-spacing: 0.45em;
        font-size: 14px;
        text-anchor: middle;
      }
      
      .spindle-line {
        fill: none;
        stroke: #1b52a4;
        stroke-width: 1.5;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <!-- SHIV NADAR -->
  <text x="300" y="60" class="brand-title">SHIV NADAR</text>

  <!-- Left Spindle Detail -->
  <path d="M 15,95 C 65,93.5 115,91 165,91" class="spindle-line" />
  <path d="M 15,95 C 65,96.5 115,99 165,99" class="spindle-line" />
  <path d="M 30,95 L 140,95" class="spindle-line" />
  <line x1="165" y1="91" x2="165" y2="99" stroke="#1b52a4" stroke-width="1.5" />

  <!-- UNIVERSITY -->
  <!-- Note: Offset slightly to visually balance the trailing letter-spacing -->
  <text x="304" y="101" class="brand-subtitle">UNIVERSITY</text>

  <!-- Right Spindle Detail -->
  <path d="M 585,95 C 535,93.5 485,91 435,91" class="spindle-line" />
  <path d="M 585,95 C 535,96.5 485,99 435,99" class="spindle-line" />
  <path d="M 570,95 L 460,95" class="spindle-line" />
  <line x1="435" y1="91" x2="435" y2="99" stroke="#1b52a4" stroke-width="1.5" />

  <!-- CHENNAI -->
  <!-- Note: Offset slightly to visually balance the trailing letter-spacing -->
  <text x="303" y="136" class="brand-location">CHENNAI</text>
</svg>
